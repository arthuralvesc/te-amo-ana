<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Te Amo Ana</title>
    <link rel="icon" type="image/png" href="hd-white-heart-shape-silhouette-png-704081694955479k47lsgva2z.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="hearts-background"></div>
    <div class="main">
        <div class="text-container">
            <h1 style="margin-bottom: 20px">Querida Ana Livia,</h1>
            <p>Obrigado por fazer com que os últimos 365 dias fossem acima de todas as minhas melhores expectativas. <br><br>

Seu coração puro e bondoso me inspira a ser uma pessoa boa todos os dias.<br><br>

Que venham mais 365 dias de uma vida inteira juntos.</p>
            <h1 style="margin-top: 20px">Eu te amo!</h1>    
        </div>
    </div>
    <script>
        const heartsContainer = document.querySelector('.hearts-background');
        const heartEmojis = ['❤️', '💕', '💖', '💗', '💓', '💞', '💝'];
        
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = Math.random() * 100 + 'vh';
            heart.style.fontSize = (Math.random() * 30 + 20) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            heartsContainer.appendChild(heart);
            
            setTimeout(() => heart.remove(), 5000);
        }
        
        setInterval(createHeart, 1500);
        for (let i = 0; i < 8; i++) {
            setTimeout(createHeart, i * 500);
        }
    </script>
</body>
</html>
